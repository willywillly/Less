<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Less</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #F5F0EA;
  --accent: #C8F135;
  --text:   #1C1C1C;
  --muted:  #9E9E9E;
  --card:   #FFFFFF;
  --border: #EDE8E2;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

#app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

/* ── ONBOARDING ── */
#onboarding {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  display: none;
  flex-direction: column;
  max-width: 430px;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  padding: 0 24px 40px;
}

.ob-logo {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  padding-top: 56px;
}

.ob-progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 24px;
  overflow: hidden;
}
.ob-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(.16,1,.3,1);
}

.ob-question {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 32px 0 24px;
}

.ob-step-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 18px;
}

.ob-q {
  font-size: 26px;
  font-weight: 600;
  line-height: 1.25;
  margin-bottom: 36px;
}

.ob-text-input {
  width: 100%;
  padding: 14px 0;
  background: none;
  border: none;
  border-bottom: 2px solid var(--border);
  font-size: 22px;
  font-family: inherit;
  font-weight: 500;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.ob-text-input:focus { border-color: var(--accent); }
.ob-text-input::placeholder { color: var(--muted); }

.ob-options { display: flex; flex-direction: column; gap: 10px; }

.ob-option {
  width: 100%;
  padding: 17px 20px;
  background: var(--card);
  border: 2px solid transparent;
  border-radius: 16px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: border-color 0.15s, background 0.15s;
}
.ob-option:hover    { border-color: #d4e8a0; }
.ob-option.selected { border-color: var(--accent); background: #f3fcd8; }

.ob-next {
  width: 100%;
  padding: 18px;
  background: var(--accent);
  border: none;
  border-radius: 16px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  margin-top: 8px;
}
.ob-next:hover  { opacity: 0.88; }
.ob-next:active { transform: scale(0.98); }
.ob-next:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* ── MAIN APP ── */
#main-app {
  display: none;
  flex-direction: column;
  min-height: 100vh;
  padding-bottom: 80px;
}

.app-header {
  padding: 52px 20px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-logo     { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.app-greeting { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ── VIEWS ── */
.view {
  display: none;
  flex-direction: column;
  gap: 12px;
  padding: 0 16px;
  animation: fadeUp 0.25s ease forwards;
}
.view.active { display: flex; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── CARDS ── */
.card {
  background: var(--card);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

.less-card {
  background: var(--card);
  border-radius: 20px;
  padding: 20px;
  border-left: 4px solid var(--accent);
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.less-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 8px;
}
.less-text {
  font-size: 17px;
  font-weight: 500;
  line-height: 1.55;
}

.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 12px;
}

/* ── SIGN IN ── */
.signin-card {
  background: var(--card);
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  display: none;
}
.signin-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.signin-card p  { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }

.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 16px;
  background: var(--text);
  border: none;
  border-radius: 14px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  transition: opacity 0.2s;
}
.google-btn:hover    { opacity: 0.85; }
.google-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── WEEK VIEW (GOOGLE CALENDAR STYLE) ── */
.week-card {
  background: var(--card);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.week-range-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.03em;
  padding: 12px 12px 0;
}
.week-grid { /* gcal container */ }

.gcal-header {
  display: grid;
  grid-template-columns: 40px repeat(7, 1fr);
  border-bottom: 1px solid var(--border);
  background: var(--card);
}
.gcal-day-head {
  text-align: center;
  padding: 8px 2px 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.gcal-day-head:hover { background: #f7f3ee; }
.gcal-day-name {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}
.gcal-day-num {
  font-size: 15px;
  font-weight: 600;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  margin: 3px auto 0;
}
.gcal-day-head.today    .gcal-day-num { background: var(--accent); font-weight: 700; }
.gcal-day-head.selected .gcal-day-num { background: #e8f7b0; }

.gcal-body {
  display: flex;
  overflow-y: auto;
  max-height: 400px;
}
.gcal-time-axis { width: 40px; flex-shrink: 0; }
.gcal-time-label {
  height: 40px;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding-right: 5px;
  font-size: 9px;
  color: var(--muted);
  margin-top: -5px;
}
.gcal-cols {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  position: relative;
}
.gcal-col {
  position: relative;
  border-left: 1px solid var(--border);
  cursor: pointer;
}
.gcal-col:hover    { background: rgba(0,0,0,0.01); }
.gcal-col.today    { background: rgba(200,241,53,0.04); }
.gcal-col.selected { background: rgba(200,241,53,0.1); }
.gcal-hour-line {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: var(--border);
  pointer-events: none;
}
.gcal-event {
  position: absolute;
  left: 1px; right: 1px;
  border-radius: 4px;
  padding: 2px 3px;
  overflow: hidden;
  z-index: 2;
  min-height: 10px;
}
.gcal-event.work    { background: #E0E0E0; }
.gcal-event.life    { background: #FFFFFF; border: 1px solid #D0C8C0; }
.gcal-event.workout { background: var(--accent); z-index: 3; }
.gcal-event-title {
  font-size: 8px;
  font-weight: 600;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.gcal-now-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: #E05050;
  z-index: 5;
  pointer-events: none;
}
.gcal-now-dot {
  position: absolute;
  left: -3px; top: -3px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #E05050;
}

/* ── DAY DETAIL ── */
.day-detail {
  background: var(--card);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  animation: fadeUp 0.2s ease forwards;
}
.day-detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.day-detail-title { font-size: 19px; font-weight: 700; }
.close-btn {
  background: var(--bg);
  border: none;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  cursor: pointer;
  color: var(--muted);
  transition: background 0.15s;
}
.close-btn:hover { background: var(--border); }

/* ── WORKOUT DISPLAY ── */
.workout-time {
  font-size: 46px;
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1;
}
.tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.tag {
  padding: 5px 13px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg);
}
.tag.accent { background: var(--accent); }

/* ── TIMELINE ── */
.timeline {
  position: relative;
  height: 52px;
  background: var(--bg);
  border-radius: 12px;
  overflow: hidden;
  margin: 16px 0 4px;
}
.tl-bar {
  position: absolute;
  top: 8px;
  height: 36px;
  border-radius: 7px;
  overflow: hidden;
}
.tl-bar.event {
  background: #E0D8CE;
  display: flex;
  align-items: center;
  padding: 0 6px;
}
.tl-bar.event span { font-size: 9px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-bar.workout {
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
}
.tl-bar.workout span { font-size: 9px; font-weight: 700; }
.tl-now {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: #E05050;
  border-radius: 1px;
}
.tl-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--muted);
  padding: 0 2px;
  margin-bottom: 12px;
}

/* ── BOOKING ── */
.book-btn {
  width: 100%;
  padding: 17px;
  background: var(--accent);
  border: none;
  border-radius: 14px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.book-btn:hover  { opacity: 0.88; }
.book-btn:active { transform: scale(0.98); }
.book-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.booked-box {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: #f3fcd8;
  border-radius: 14px;
}
.booked-check { font-size: 20px; }
.booked-text  { font-size: 14px; font-weight: 600; }
.booked-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

.remove-btn {
  width: 100%;
  padding: 13px;
  background: none;
  border: 1.5px solid #F0C0C0;
  border-radius: 13px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  color: #D05050;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s;
}
.remove-btn:hover { background: #fff5f5; }

/* ── EVENTS LIST ── */
.event-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.event-row:last-child { border: none; }
.ev-title         { font-weight: 500; }
.ev-title.workout { color: #3d9c4a; }
.ev-time          { font-size: 11px; color: var(--muted); white-space: nowrap; margin-left: 8px; }

/* ── WEATHER ── */
.wx-row { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
.wx-row img { width: 48px; height: 48px; }
.wx-temp { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
.wx-desc { font-size: 12px; color: var(--muted); margin-top: 2px; text-transform: capitalize; }

/* ── PROFILE ── */
.profile-header { display: flex; align-items: center; gap: 16px; }
.profile-pic {
  width: 60px; height: 60px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.profile-initials {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  flex-shrink: 0;
}
.profile-name  { font-size: 20px; font-weight: 700; }
.profile-email { font-size: 12px; color: var(--muted); margin-top: 3px; }
.connected-row {
  display: flex; align-items: center; gap: 6px;
  margin-top: 6px; font-size: 12px; font-weight: 500; color: #4CAF50;
}
.connected-dot { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; }

.pref-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.pref-row:last-child { border: none; }
.pref-label { color: var(--muted); font-size: 12px; }
.pref-val   { font-weight: 600; }

.city-input {
  width: 100%; padding: 14px 16px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 12px; font-family: inherit; font-size: 15px;
  color: var(--text); outline: none; margin-top: 8px;
  transition: border-color 0.2s;
}
.city-input:focus { border-color: var(--accent); }

.loc-status {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; background: #f3fcd8;
  border-radius: 12px; margin-top: 8px;
  font-size: 13px; font-weight: 500;
}
.loc-dot { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; flex-shrink: 0; }

.signout-btn {
  width: 100%; padding: 16px;
  background: none; border: 1.5px solid var(--border);
  border-radius: 14px; font-family: inherit; font-size: 15px;
  font-weight: 500; color: var(--muted); cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.signout-btn:hover { border-color: #D0C8C0; color: var(--text); }

/* ── BOTTOM NAV ── */
#bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 0;
  background: none; border: none;
  font-family: inherit; cursor: pointer;
  transition: opacity 0.15s;
}
.nav-btn:hover { opacity: 0.7; }
.nav-icon  { font-size: 20px; line-height: 1; }
.nav-label {
  font-size: 10px; font-weight: 600;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.nav-btn.active .nav-label { color: var(--text); }

/* ── LOADING ── */
.loading {
  display: flex; justify-content: center; gap: 6px; padding: 48px 20px;
}
.loading-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  animation: bounce 0.8s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.12s; }
.loading-dot:nth-child(3) { animation-delay: 0.24s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.5); opacity: 0.4; }
  40%           { transform: scale(1);   opacity: 1;   }
}

.error-card {
  background: #FFF5F5; border: 1px solid #FFCFCF;
  border-radius: 16px; padding: 16px;
  font-size: 13px; color: #C0392B; line-height: 1.55;
}

/* ── LESS CHAT ── */
.less-chat-wrap {
  margin-top: 4px;
}

.less-messages {
  display: flex; flex-direction: column; gap: 8px;
  max-height: 220px; overflow-y: auto;
  padding: 12px 16px 4px;
  -webkit-overflow-scrolling: touch;
}

.less-msg {
  max-width: 90%; font-size: 13px; line-height: 1.5;
  padding: 9px 13px; border-radius: 16px;
  word-break: break-word;
}
.less-msg.ai {
  background: var(--bg); color: var(--text);
  align-self: flex-start; border-bottom-left-radius: 4px;
}
.less-msg.user {
  background: var(--text); color: var(--bg);
  align-self: flex-end; border-bottom-right-radius: 4px;
}

.less-thinking {
  font-size: 12px; color: var(--muted);
  align-self: flex-start; padding: 6px 0 0 2px;
  display: flex; align-items: center; gap: 5px;
}
.less-thinking-dots {
  display: flex; gap: 3px;
}
.less-thinking-dots span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--muted);
  animation: pulse-dot 1.2s ease-in-out infinite;
}
.less-thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.less-thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse-dot {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40%           { opacity: 1;   transform: scale(1);   }
}

.less-input-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px 12px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
}
.less-input {
  flex: 1; padding: 9px 14px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 20px; font-family: inherit; font-size: 13px;
  color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.less-input:focus { border-color: var(--accent); }
.less-input::placeholder { color: var(--muted); }

.less-send-btn {
  width: 36px; height: 36px; flex-shrink: 0;
  background: var(--accent); border: none; border-radius: 50%;
  font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: transform 0.1s, opacity 0.1s;
}
.less-send-btn:active { transform: scale(0.92); }
.less-send-btn:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<div id="app">

  <!-- ONBOARDING -->
  <div id="onboarding">
    <div class="ob-logo">Less.</div>
    <div class="ob-progress-bar">
      <div class="ob-progress-fill" id="ob-fill" style="width:0%"></div>
    </div>
    <div class="ob-question">
      <div class="ob-step-label" id="ob-step"></div>
      <div class="ob-q" id="ob-q"></div>
      <div id="ob-input-area"></div>
    </div>
    <button class="ob-next" id="ob-next" disabled onclick="obNext()">Continue →</button>
  </div>

  <!-- MAIN APP -->
  <div id="main-app">
    <div class="app-header">
      <div>
        <div class="app-logo">Less.</div>
        <div class="app-greeting" id="app-greeting"></div>
      </div>
      <div id="user-mini" style="display:none">
        <img id="user-pic" src="" alt="" class="profile-pic" style="width:34px;height:34px"/>
      </div>
    </div>

    <!-- WEEK VIEW -->
    <div class="view active" id="view-week">
      <div class="signin-card" id="signin-card">
        <h2>Connect your calendar</h2>
        <p>Less reads your schedule to find your best workout windows — no thinking required.</p>
        <button class="google-btn" id="google-btn" onclick="connectGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>

          Sign in with Google

        <span class="nav-label">Profile</span>

<script>
// ── CONFIG ──
const GC_ID  = "855044137697-d4aanrhb4cklaoh471atit4ibep87nl5.apps.googleusercontent.com";
const OW_KEY = "98bdd5b55dfead8e98b676bfc235e291";
const SCOPE  = "https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events";

// ── STATE ──
let gcToken     = null;
let userInfo    = null;
let tokenClient = null;
let weekEvents   = {};
let weekForecast = {};
let weekRecs     = {};
let selectedDayKey = null;
let currentCoords  = null;

// ── LESS AI ──
const LESS_SYSTEM = `You are Less — a calm, encouraging workout scheduler living inside a mobile app. Your personality:
- Speak like a wise, supportive friend who genuinely understands how busy life is
- NEVER guilt-trip, shame, or use words like "should", "must", or "fail"
- Be concise: max 3 sentences per response unless the user asks for detail
- Use the user's name and their preferences when you know them
- When the user asks about today's workout: reference their actual schedule data and suggest the specific time window already computed
- For general questions: give practical, kind advice grounded in their stated preferences
- Always end with something actionable or uplifting, never a vague platitude`;

// chat state per day key
const chatHistory = {};  // key -> [{role, content}]
let chatContext   = {};  // key -> context string
let aiPending     = {};  // key -> bool (debounce)

// ─────────────────────────────────────────────
// ONBOARDING
// ─────────────────────────────────────────────
const OB_STEPS = [
  { key: 'name',      q: "What's your name?",                               type: 'text',    placeholder: 'Your name…' },
  { key: 'frequency', q: 'How many days a week can you realistically move?', type: 'options', options: ['1–3 days', '3–5 days', 'Every day'] },
  { key: 'duration',  q: 'How long per session?',                            type: 'options', options: ['15–30 min', '30–45 min', '45+ min'] },
  { key: 'time',      q: 'What time of day do you prefer?',                  type: 'options', options: ['Morning', 'Afternoon', 'Evening', 'No preference'] },
  { key: 'barrier',   q: 'What usually gets in the way?',                    type: 'options', options: ['Work', 'Energy', 'Motivation', 'Time'] },
  { key: 'movement',  q: 'What kind of movement do you like?',               type: 'options', options: ['Walking / Running', 'Gym', 'Home workouts', 'Anything'] },
];

let obStep = 0, obAnswers = {}, obCurrent = null;

function showOnboarding() {
  document.getElementById('onboarding').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
  renderObStep();
}

function renderObStep() {
  const step  = OB_STEPS[obStep];
  const total = OB_STEPS.length;
  document.getElementById('ob-fill').style.width    = `${(obStep / total) * 100}%`;
  document.getElementById('ob-step').textContent    = `${obStep + 1} of ${total}`;
  document.getElementById('ob-q').textContent       = step.q;
  obCurrent = null;
  const next = document.getElementById('ob-next');
  next.disabled    = true;
  next.textContent = obStep < total - 1 ? 'Continue →' : 'Get started →';

  const area = document.getElementById('ob-input-area');
  if (step.type === 'text') {
    area.innerHTML = `<input class="ob-text-input" id="ob-text" type="text" placeholder="${step.placeholder}" autocomplete="given-name"/>`;
    const inp = document.getElementById('ob-text');
    inp.focus();
    inp.addEventListener('input', () => { obCurrent = inp.value.trim(); next.disabled = !obCurrent; });
    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && obCurrent) obNext(); });
  } else {
    area.innerHTML = `<div class="ob-options">${
      step.options.map(opt => `<button class="ob-option" onclick="obSelect(this,'${opt.replace(/'/g,"&#39;")}')">${opt}</button>`).join('')
    }</div>`;
  }
}

function obSelect(btn, val) {
  document.querySelectorAll('.ob-option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  obCurrent = val;
  document.getElementById('ob-next').disabled = false;
}

function obNext() {
  if (!obCurrent) return;
  obAnswers[OB_STEPS[obStep].key] = obCurrent;
  obStep++;
  if (obStep >= OB_STEPS.length) {
    localStorage.setItem('less_onboarding', JSON.stringify(obAnswers));
    localStorage.setItem('less_onboarding_done', '1');
    document.getElementById('ob-fill').style.width = '100%';
    setTimeout(() => {
      document.getElementById('onboarding').style.display = 'none';
      bootMainApp();
    }, 280);
  } else {
    renderObStep();
  }
}

// ─────────────────────────────────────────────
// SESSION PERSISTENCE (localStorage)
// ─────────────────────────────────────────────
function storeSession(token, user) {
  localStorage.setItem('less_session', JSON.stringify({
    token,
    user,
    expiry: Date.now() + 55 * 60 * 1000,
  }));
}

function loadSession() {
  try {
    const s = JSON.parse(localStorage.getItem('less_session') || 'null');
    if (!s) return null;
    if (Date.now() > s.expiry) return { token: null, user: s.user };
    return s;
  } catch { return null; }
}

function clearSession() {
  localStorage.removeItem('less_session');
}

// ─────────────────────────────────────────────
// LOCATION DETECTION
// ─────────────────────────────────────────────
function initLocation() {
  const stored = localStorage.getItem('less_coords');
  if (stored) {
    try {
      currentCoords = JSON.parse(stored);
      renderLocationUI(true);
      return;
    } catch { /* fall through */ }
  }
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        currentCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        localStorage.setItem('less_coords', JSON.stringify(currentCoords));
        renderLocationUI(true);
      },
      () => {
        // Permission denied — show city input fallback
        renderLocationUI(false);
      },
      { timeout: 8000 }
    );
  } else {
    renderLocationUI(false);
  }
}

function renderLocationUI(hasCoords) {
  const statusArea = document.getElementById('loc-status-area');
  const cityInput  = document.getElementById('city-input');
  if (!statusArea || !cityInput) return;

  if (hasCoords) {
    statusArea.innerHTML = `<div class="loc-status"><div class="loc-dot"></div>Using your location</div>`;
    cityInput.style.display = 'none';
    // Add a small "use city instead" link
    statusArea.innerHTML += `<p style="font-size:11px;color:var(--muted);margin-top:6px;cursor:pointer" onclick="switchToCity()">Use city name instead</p>`;
  } else {
    statusArea.innerHTML = '';
    cityInput.style.display = 'block';
    cityInput.value = localStorage.getItem('less_city') || '';
    cityInput.addEventListener('change', () => {
      localStorage.setItem('less_city', cityInput.value);
      localStorage.removeItem('less_coords');
      currentCoords = null;
    });
  }
}

function switchToCity() {
  localStorage.removeItem('less_coords');
  currentCoords = null;
  renderLocationUI(false);
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
function init() {
  if (!localStorage.getItem('less_onboarding_done')) {
    showOnboarding();
    return;
  }
  bootMainApp();
}

function bootMainApp() {
  const app = document.getElementById('main-app');
  app.style.display       = 'flex';
  app.style.flexDirection = 'column';

  updateGreeting();
  renderProfile();
  initLocation();

  const session = loadSession();
  if (session && session.token) {
    gcToken  = session.token;
    userInfo = session.user;
    updateUserUI();
    initTokenClient(session.user?.email || '');
    showSignedIn();
    loadWeekData();
  } else if (session && session.user) {
    userInfo = session.user;
    updateUserUI();
    document.getElementById('week-loading').style.display = 'flex';
    document.getElementById('today-loading').style.display = 'flex';
    initTokenClient(session.user.email || '', true);
  } else {
    document.getElementById('signin-card').style.display = 'block';
    initTokenClient('', false);
  }
}

// ─────────────────────────────────────────────
// GOOGLE AUTH
// ─────────────────────────────────────────────
function initTokenClient(hint, silentRefresh) {
  if (!window.google) {
    setTimeout(() => initTokenClient(hint, silentRefresh), 150);
    return;
  }
  const cfg = { client_id: GC_ID, scope: SCOPE, callback: onTokenReceived };
  if (hint) cfg.login_hint = hint;
  tokenClient = window.google.accounts.oauth2.initTokenClient(cfg);
  if (silentRefresh) tokenClient.requestAccessToken({ prompt: '' });
}

async function onTokenReceived(resp) {
  if (resp.error) {
    document.getElementById('week-loading').style.display   = 'none';
    document.getElementById('today-loading').style.display  = 'none';
    document.getElementById('signin-card').style.display    = 'block';
    const btn = document.getElementById('google-btn');
    if (btn) { btn.disabled = false; }
    return;
  }
  gcToken = resp.access_token;
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: `Bearer ${gcToken}` },
    });
    userInfo = await r.json();
    storeSession(gcToken, userInfo);
    updateUserUI();
  } catch(e) { storeSession(gcToken, null); }
  showSignedIn();
  await loadWeekData();
}

function showSignedIn() {
  document.getElementById('signin-card').style.display   = 'none';
  document.getElementById('week-loading').style.display  = 'none';
}

function connectGoogle() {
  if (!tokenClient) { setTimeout(connectGoogle, 150); return; }
  const btn = document.getElementById('google-btn');
  btn.disabled    = true;
  btn.textContent = 'Connecting…';
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function updateUserUI() {
  if (!userInfo) return;
  const pic  = document.getElementById('user-pic');
  const mini = document.getElementById('user-mini');
  if (userInfo.picture) { pic.src = userInfo.picture; mini.style.display = 'block'; }
  updateGreeting();
  renderProfile();
}

function updateGreeting() {
  const prefs = JSON.parse(localStorage.getItem('less_onboarding') || '{}');
  const name  = prefs.name || userInfo?.name?.split(' ')[0] || '';
  const h     = new Date().getHours();
  const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  const el = document.getElementById('app-greeting');
  if (el) el.textContent = name ? `${greet}, ${name}.` : new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
}

function signOut() {
  clearSession();
  localStorage.removeItem('less_onboarding_done');
  localStorage.removeItem('less_onboarding');
  location.reload();
}

// ─────────────────────────────────────────────
// DATA LOADING
// ─────────────────────────────────────────────
async function loadWeekData() {
  document.getElementById('week-loading').style.display  = 'flex';
  document.getElementById('week-content').style.display  = 'none';
  document.getElementById('today-loading').style.display = 'flex';
  document.getElementById('today-content').innerHTML     = '';

  try {
    const { weekStart, weekEnd, days } = getWeekDays();

    const calRes = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${weekStart.toISOString()}&timeMax=${weekEnd.toISOString()}&singleEvents=true&orderBy=startTime`,
      { headers: { Authorization: `Bearer ${gcToken}` } }
    );
    if (!calRes.ok) throw new Error('Calendar fetch failed. Make sure Calendar API is enabled.');
    const allEvents = (await calRes.json()).items || [];

    weekEvents = {};
    for (const day of days) {
      const key = dayKey(day);
      weekEvents[key] = allEvents.filter(ev => {
        const d = new Date(ev.start.dateTime || ev.start.date + 'T00:00:00');
        return d.toDateString() === day.toDateString();
      });
    }

    // Weather: prefer geolocation coords, fall back to city
    try {
      let wxUrl;
      if (currentCoords) {
        wxUrl = `https://api.openweathermap.org/data/2.5/forecast?lat=${currentCoords.lat}&lon=${currentCoords.lon}&appid=${OW_KEY}&units=imperial`;
      } else {
        const city = localStorage.getItem('less_city') || document.getElementById('city-input')?.value || 'New York,NY';
        wxUrl = `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&appid=${OW_KEY}&units=imperial`;
      }
      const wxRes = await fetch(wxUrl);
      if (wxRes.ok) buildWeekForecast(days, await wxRes.json());
    } catch(e) { /* weather optional */ }

    weekRecs = {};
    for (const day of days) {
      const key = dayKey(day);
      weekRecs[key] = computeRec(day, weekEvents[key] || [], weekForecast[key]);
    }

    const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    document.getElementById('week-range').textContent = `${fmt(days[0])} – ${fmt(days[6])}`;

    renderWeekGrid(days);
    renderTodayView();

    document.getElementById('week-loading').style.display  = 'none';
    document.getElementById('week-content').style.display  = 'block';
    document.getElementById('today-loading').style.display = 'none';

  } catch(e) {
    document.getElementById('week-loading').style.display  = 'none';
    document.getElementById('today-loading').style.display = 'none';
    const err = document.createElement('div');
    err.className = 'error-card';
    err.style.margin = '0 16px';
    err.textContent = e.message;
    document.getElementById('view-week').appendChild(err);
  }
}

// ─────────────────────────────────────────────
// LESS AI
// ─────────────────────────────────────────────
function buildAIContext(key) {
  const prefs   = JSON.parse(localStorage.getItem('less_onboarding') || '{}');
  const events  = weekEvents[key]  || [];
  const rec     = weekRecs[key];
  const wx      = weekForecast[key];
  const name    = prefs.name ? `User's name: ${prefs.name}.` : '';
  const prefStr = [
    prefs.frequency && `Frequency: ${prefs.frequency}`,
    prefs.duration  && `Preferred session: ${prefs.duration}`,
    prefs.time      && `Preferred time: ${prefs.time}`,
    prefs.barrier   && `Main barrier: ${prefs.barrier}`,
    prefs.movement  && `Movement type: ${prefs.movement}`,
  ].filter(Boolean).join('; ');

  const dateObj = new Date(key);
  dateObj.setHours(12, 0, 0, 0);
  const isToday = dateObj.toDateString() === new Date().toDateString();
  const dateLabel = isToday
    ? 'Today'
    : dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

  const evList = events
    .filter(e => e.start.dateTime)
    .map(e => {
      const s = toMin(e.start.dateTime), en = toMin(e.end.dateTime);
      return `  - ${e.summary||'Event'}: ${toLabel(s)}–${toLabel(en)}`;
    }).join('\n') || '  (none)';

  let slotStr = 'No open windows.';
  if (rec?.slot) {
    slotStr = `Best window: ${toLabel(rec.slot.s)} (${rec.slot.dur} min available)`;
    if (rec.type) slotStr += `, suggested type: ${rec.type}`;
  }

  const wxStr = wx ? `Weather: ${wx.temp}°F, ${wx.desc}` : '';

  return [
    `Date: ${dateLabel}.`,
    name,
    prefStr ? `User preferences: ${prefStr}.` : '',
    `Schedule:\n${evList}`,
    slotStr,
    wxStr,
  ].filter(Boolean).join('\n');
}

async function callLessAPI(messages) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system: LESS_SYSTEM, messages }),
  });
  if (!res.ok) throw new Error(`API error ${res.status}`);
  const data = await res.json();
  return data?.content?.[0]?.text || '';
}

function initLessChat(key, containerEl) {
  if (!chatHistory[key]) {
    chatHistory[key] = [];
    chatContext[key] = buildAIContext(key);
  }

  // Inject chat UI into the less-card in containerEl
  const lessCard = containerEl.querySelector('.less-card');
  if (!lessCard) return;

  // Don't double-init
  if (lessCard.querySelector('.less-chat-wrap')) return;

  // Add chat wrap below the less-text
  const chatWrap = document.createElement('div');
  chatWrap.className = 'less-chat-wrap';
  chatWrap.id = `chat-wrap-${key}`;
  chatWrap.innerHTML = `
    <div class="less-messages" id="chat-msgs-${key}"></div>
    <div class="less-input-row">
      <input class="less-input" id="chat-input-${key}" type="text"
        placeholder="ask Less anything…"
        onkeydown="if(event.key==='Enter')sendLessChat('${key}')"/>
      <button class="less-send-btn" id="chat-send-${key}" onclick="sendLessChat('${key}')">↑</button>
    </div>`;
  lessCard.appendChild(chatWrap);

  // Restore prior history (if revisiting the card)
  const msgsEl = document.getElementById(`chat-msgs-${key}`);
  chatHistory[key].forEach(m => addChatMsg(msgsEl, m.content, m.role));

  // Auto-fetch the opening Less recommendation if no history yet
  if (chatHistory[key].length === 0) {
    autoLessRec(key);
  }
}

async function autoLessRec(key) {
  if (aiPending[key]) return;
  aiPending[key] = true;

  const msgsEl = document.getElementById(`chat-msgs-${key}`);
  if (!msgsEl) { aiPending[key] = false; return; }

  // Show thinking indicator
  const thinkingId = `thinking-${key}`;
  msgsEl.insertAdjacentHTML('beforeend', `
    <div class="less-thinking" id="${thinkingId}">
      <div class="less-thinking-dots"><span></span><span></span><span></span></div>
    </div>`);
  msgsEl.scrollTop = msgsEl.scrollHeight;

  // Seed the conversation with context
  const contextMsg = { role: 'user', content: `Context:\n${chatContext[key]}\n\nGive me a brief, encouraging workout recommendation for this day. Be specific about the time window.` };

  try {
    const text = await callLessAPI([contextMsg]);
    document.getElementById(thinkingId)?.remove();

    // Display AI msg and store in history (but don't store the hidden context seed)
    addChatMsg(msgsEl, text, 'ai');
    chatHistory[key].push({ role: 'ai', content: text });

    // Update the less-text in the card too
    const lessCard = document.getElementById(`chat-wrap-${key}`)?.closest('.less-card');
    const lt = lessCard?.querySelector('.less-text');
    if (lt) lt.textContent = text.split('.')[0] + '.';
  } catch {
    document.getElementById(thinkingId)?.remove();
    // Silently fall back — keep the rules-based phrase already showing
  }
  aiPending[key] = false;
}

async function sendLessChat(key) {
  const input  = document.getElementById(`chat-input-${key}`);
  const sendBtn = document.getElementById(`chat-send-${key}`);
  if (!input) return;

  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  sendBtn.disabled = true;
  aiPending[key] = true;

  const msgsEl = document.getElementById(`chat-msgs-${key}`);
  addChatMsg(msgsEl, text, 'user');
  chatHistory[key].push({ role: 'user', content: text });

  // Build the full message array for Claude
  // First message injects context so Claude knows the schedule
  const apiMessages = [
    { role: 'user', content: `Context:\n${chatContext[key]}\n\n${chatHistory[key][0]?.role === 'ai' ? 'Previous recommendation: ' + (chatHistory[key][0]?.content || '') + '\n\n' : ''}User asks: ${text}` },
  ];

  // If we have a prior AI reply, include back-and-forth from message 1 onward
  if (chatHistory[key].length > 2) {
    const turns = chatHistory[key].slice(1); // skip the first AI rec which is already in context seed
    const apiTurns = [];
    let i = 0;
    // Find first user msg after first AI rec
    while (i < turns.length && turns[i].role === 'ai') i++;
    for (; i < turns.length - 1; i++) {
      apiTurns.push({ role: turns[i].role === 'user' ? 'user' : 'assistant', content: turns[i].content });
    }
    // Replace the simple apiMessages[0] with context + prior turns + new question
    if (apiTurns.length) {
      apiMessages[0].content = `Context:\n${chatContext[key]}\n\nPrior recommendation: ${chatHistory[key][0]?.content || ''}`;
      apiMessages.push(...apiTurns);
      apiMessages.push({ role: 'user', content: text });
    }
  }

  const thinkingId = `thinking-reply-${key}-${Date.now()}`;
  msgsEl.insertAdjacentHTML('beforeend', `
    <div class="less-thinking" id="${thinkingId}">
      <div class="less-thinking-dots"><span></span><span></span><span></span></div>
    </div>`);
  msgsEl.scrollTop = msgsEl.scrollHeight;

  try {
    const reply = await callLessAPI(apiMessages);
    document.getElementById(thinkingId)?.remove();
    addChatMsg(msgsEl, reply, 'ai');
    chatHistory[key].push({ role: 'ai', content: reply });
  } catch {
    document.getElementById(thinkingId)?.remove();
    addChatMsg(msgsEl, "Sorry, I'm having trouble right now. Try again in a moment.", 'ai');
  }

  sendBtn.disabled = false;
  aiPending[key] = false;
}

function addChatMsg(container, text, role) {
  const div = document.createElement('div');
  div.className = `less-msg ${role}`;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ─────────────────────────────────────────────
// WEEK UTILS
// ─────────────────────────────────────────────
function getWeekDays() {
  const today  = new Date();
  const dow    = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  monday.setHours(0, 0, 0, 0);

  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });

  const weekStart = new Date(monday);
  const weekEnd   = new Date(monday);
  weekEnd.setDate(monday.getDate() + 7);

  return { weekStart, weekEnd, days };
}

function dayKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// ─────────────────────────────────────────────
// WEATHER
// ─────────────────────────────────────────────
function buildWeekForecast(days, wxData) {
  const list = wxData.list || [];
  for (const day of days) {
    const noon   = new Date(day);
    noon.setHours(12, 0, 0, 0);
    const noonTs = noon.getTime() / 1000;
    let closest = null, minDiff = Infinity;
    for (const item of list) {
      const diff = Math.abs(item.dt - noonTs);
      if (diff < minDiff) { minDiff = diff; closest = item; }
    }
    if (closest) {
      weekForecast[dayKey(day)] = {
        icon: closest.weather[0].icon,
        temp: Math.round(closest.main.temp),
        desc: closest.weather[0].description,
        main: closest.weather[0].main,
      };
    }
  }
}

const WX_EMOJI = { Clear:'☀️', Clouds:'☁️', Rain:'🌧', Drizzle:'🌦', Thunderstorm:'⛈', Snow:'❄️', Mist:'🌫', Fog:'🌫', Haze:'🌫' };
const wxEmoji = main => WX_EMOJI[main] || '🌤';

// ─────────────────────────────────────────────
// FREE SLOTS (smarter: 30min buffer, 9pm cutoff)
// ─────────────────────────────────────────────
function toMin(iso) { const d = new Date(iso); return d.getHours() * 60 + d.getMinutes(); }

function toLabel(m) {
  const h = Math.floor(m / 60), mn = m % 60;
  return `${h % 12 || 12}:${String(mn).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;
}

function getFreeSlots(events, date) {
  const isToday = date.toDateString() === new Date().toDateString();
  const nowMin  = isToday ? new Date().getHours() * 60 + new Date().getMinutes() : 0;
  const DAY_START = 6 * 60;   // 6am
  const DAY_END   = 21 * 60;  // 9pm hard cutoff — never suggest after this

  const busy = events
    .filter(ev => ev.start.dateTime)
    .map(ev => ({ s: toMin(ev.start.dateTime), e: toMin(ev.end.dateTime) }))
    .sort((a, b) => a.s - b.s);

  // Merge overlapping blocks
  const merged = [];
  for (const b of busy) {
    if (merged.length && b.s <= merged[merged.length - 1].e)
      merged[merged.length - 1].e = Math.max(merged[merged.length - 1].e, b.e);
    else merged.push({ ...b });
  }

  let cur = Math.max(DAY_START, isToday ? nowMin : DAY_START);
  let prevEventEnd = null;
  const slots = [];

  for (const b of merged) {
    if (b.s > cur) {
      // 30-min buffer before event: slot must end 30 min before event starts
      const slotEnd = Math.min(b.s - 30, DAY_END);
      if (slotEnd - cur >= 20) {
        const leftBuffer = prevEventEnd !== null ? cur - prevEventEnd : Infinity;
        slots.push({ s: cur, e: slotEnd, dur: slotEnd - cur, leftBuffer });
      }
    }
    prevEventEnd = b.e;
    // 15-min buffer after event: next slot starts 15 min after event ends
    cur = Math.max(cur, b.e + 15);
  }

  // Gap after last event (no next-event buffer needed here)
  if (DAY_END - cur >= 20) {
    const leftBuffer = prevEventEnd !== null ? cur - prevEventEnd : Infinity;
    slots.push({ s: cur, e: DAY_END, dur: DAY_END - cur, leftBuffer });
  }

  return slots;
}

// ─────────────────────────────────────────────
// RECOMMENDATION ENGINE (smarter scoring)
// ─────────────────────────────────────────────
function scoreSlots(slots, wx, prefs) {
  const rain = wx && ['Rain','Drizzle','Thunderstorm','Snow'].includes(wx.main);
  const nice = wx && !rain && wx.temp > 40 && wx.temp < 90;

  const tMap = { Morning: [6*60, 12*60], Afternoon: [12*60, 17*60], Evening: [17*60, 21*60] };
  const prefRange = prefs?.time && tMap[prefs.time] ? tMap[prefs.time] : null;

  return slots.map(sl => {
    let score = 0;
    let isIdeal = false;

    // Prefer mid-length blocks (45–90 min) — sweet spot
    if (sl.dur >= 45 && sl.dur <= 90) { score += 3; isIdeal = true; }
    else if (sl.dur >= 30 && sl.dur < 45) score += 1;
    else if (sl.dur > 90) score += 1;   // long is fine but not the hero pick

    // Time-of-day preference
    if (prefRange) {
      const mid = (sl.s + sl.e) / 2;
      if (mid >= prefRange[0] && mid < prefRange[1]) { score += 2; }
    }

    // Left-side buffer bonus (≥15 min gap after previous event)
    if (sl.leftBuffer >= 15) score += 0.5;

    // Weather
    if (nice) score += 0.5;
    if (rain) score -= 0.5;

    return { ...sl, score, rain, nice, isIdeal };
  }).sort((a, b) => b.score - a.score || (b.dur <= 90 ? b.dur : 90) - (a.dur <= 90 ? a.dur : 90));
}

function computeRec(date, events, wx) {
  const allSlots = getFreeSlots(events, date);
  const prefs    = JSON.parse(localStorage.getItem('less_onboarding') || '{}');

  if (!allSlots.length) {
    return { slot: null, phrase: buildPhrase(date, null, 0, wx, 'no_slots', null), type: 'Rest day' };
  }

  // Hard time-window filter — user preference is a first-class constraint, not just a score bonus
  const tMap = {
    Morning:   [6 * 60,  12 * 60],  // 6am – 12pm
    Afternoon: [12 * 60, 18 * 60],  // 12pm – 6pm
    Evening:   [18 * 60, 21 * 60],  // 6pm – 9pm
  };
  const prefWindow     = prefs.time && tMap[prefs.time] ? tMap[prefs.time] : null;
  const fallbackPref   = prefs.time && prefWindow ? prefs.time : null;

  // Clip each slot to the preferred window; drop anything under 20 min after clipping
  const clipToWindow = (slots, window) =>
    slots.map(s => {
      const cs = Math.max(s.s, window[0]);
      const ce = Math.min(s.e, window[1]);
      return ce - cs >= 20 ? { ...s, s: cs, e: ce, dur: ce - cs } : null;
    }).filter(Boolean);

  const prefSlots = prefWindow ? clipToWindow(allSlots, prefWindow) : allSlots;

  let usedSlots       = prefSlots.length ? prefSlots : allSlots;
  let fellBack        = prefSlots.length === 0 && prefWindow !== null;

  const scored   = scoreSlots(usedSlots, wx, prefs);
  const best     = scored[0];
  const hasIdeal = scored.some(s => s.isIdeal);
  const quality  = fellBack
    ? 'fallback'
    : (hasIdeal && best.isIdeal ? 'ideal' : 'best_available');

  return {
    slot: best,
    phrase: buildPhrase(date, best, usedSlots.length, wx, quality, fellBack ? fallbackPref : null),
    type: getWorkoutType(prefs, wx),
    scored,
    events,
    wx,
    hasIdeal,
  };
}

function getWorkoutType(prefs, wx) {
  const m    = prefs.movement || 'Anything';
  const rain = wx && ['Rain','Drizzle','Thunderstorm','Snow'].includes(wx.main);
  if (rain && m !== 'Gym' && m !== 'Home workouts') return 'Home workout';
  if (m === 'Walking / Running') return 'Run or walk';
  if (m === 'Gym')               return 'Gym session';
  if (m === 'Home workouts')     return 'Home workout';
  return 'Your choice';
}

function buildPhrase(date, slot, totalSlots, wx, quality, fallbackPrefName) {
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const today = new Date();
  const tom   = new Date(); tom.setDate(today.getDate() + 1);
  const isToday    = date.toDateString() === today.toDateString();
  const isTomorrow = date.toDateString() === tom.toDateString();
  const ref  = isToday ? 'Today' : isTomorrow ? 'Tomorrow' : DAYS[date.getDay()];

  const rain = wx && ['Rain','Drizzle','Thunderstorm','Snow'].includes(wx.main);
  const hot  = wx && wx.temp > 87;
  const cold = wx && wx.temp < 36;

  if (!slot) {
    if (isToday) return "Today's packed end to end. Rest up — or sneak in 10 minutes whenever.";
    return `${ref} looks tight. A rest day is still a good day.`;
  }

  const time   = toLabel(slot.s);
  const durStr = slot.dur >= 45 ? '45 minutes' : slot.dur >= 30 ? '30 minutes' : '20 minutes';

  // Fell back from preferred time window — explain clearly
  if (quality === 'fallback' && fallbackPrefName) {
    const pref = fallbackPrefName.toLowerCase();
    return `Nothing open in the ${pref} ${isToday ? 'today' : 'on ' + DAYS[date.getDay()]} — best I found is ${time}. Still want it?`;
  }

  // Imperfect slot messages (within preferred window but not ideal duration)
  if (quality === 'best_available') {
    if (slot.dur < 25) {
      return `${ref}'s packed end to end. Best I can do is ${durStr} at ${time} — take it or skip it.`;
    }
    if (totalSlots === 1) {
      return `One tight window ${isToday ? 'today' : 'on ' + DAYS[date.getDay()]} — ${time}. Not ideal, but it's there.`;
    }
    return `Nothing perfect ${isToday ? 'today' : 'on ' + DAYS[date.getDay()]}. ${time} is your best shot — ${durStr}.`;
  }

  if (totalSlots === 1) {
    if (rain) return `${ref} has one window — ${time}. Weather's rough, keep it inside.`;
    return `One open slot ${isToday ? 'today' : 'on ' + DAYS[date.getDay()]} — ${time}. Make it count.`;
  }

  if (slot.s < 12 * 60) {
    if (rain)  return `Morning window at ${time}. Take it inside — ${durStr}.`;
    if (cold)  return `${time} works. It's cold out, layer up or stay in.`;
    return `${ref} morning looks open at ${time}. ${durStr}, go move.`;
  }

  if (slot.s >= 17 * 60) {
    if (rain) return `${time} ${isToday ? 'tonight' : 'on ' + DAYS[date.getDay()]} — indoor workout, ${durStr}.`;
    return `${ref} at ${time} looks clean. Good time to decompress.`;
  }

  if (hot)  return `${time} is open. Hot out — hydrate or go early.`;
  if (rain) return `${time} on ${ref} — ${durStr} inside. The weather's not cooperating.`;
  if (totalSlots >= 3) return `${ref} at ${time} looks clean. ${durStr}, go outside.`;
  return `${time} is your best window ${isToday ? 'today' : 'on ' + DAYS[date.getDay()]}. ${durStr}.`;
}

// ─────────────────────────────────────────────
// WEEK GRID (Google Calendar style)
// ─────────────────────────────────────────────
function renderWeekGrid(days) {
  const DAY_NAMES  = ['Mo','Tu','We','Th','Fr','Sa','Su'];
  const todayStr   = new Date().toDateString();
  const HOUR_H     = 40;      // px per hour
  const GRID_START = 6;       // 6am
  const GRID_END   = 22;      // 10pm
  const TOTAL_H    = (GRID_END - GRID_START) * HOUR_H;

  // Header
  const headerCells = days.map((day, i) => {
    const key     = dayKey(day);
    const isToday = day.toDateString() === todayStr;
    const isSel   = selectedDayKey === key;
    return `<div class="gcal-day-head${isToday ? ' today' : ''}${isSel ? ' selected' : ''}" onclick="toggleDay('${key}')">
      <div class="gcal-day-name">${DAY_NAMES[i]}</div>
      <div class="gcal-day-num">${day.getDate()}</div>
    </div>`;
  }).join('');

  // Time axis labels
  let timeLabels = '';
  for (let h = GRID_START; h <= GRID_END; h++) {
    const label = h === 12 ? '12P' : h > 12 ? `${h - 12}P` : `${h}A`;
    timeLabels += `<div class="gcal-time-label">${h === GRID_START ? '' : label}</div>`;
  }

  // Day columns
  const cols = days.map(day => {
    const key     = dayKey(day);
    const isToday = day.toDateString() === todayStr;
    const isSel   = selectedDayKey === key;
    const events  = weekEvents[key] || [];
    const rec     = weekRecs[key];
    const wx      = weekForecast[key];

    // Hour grid lines
    let hourLines = '';
    for (let h = 0; h < GRID_END - GRID_START; h++) {
      hourLines += `<div class="gcal-hour-line" style="top:${h * HOUR_H}px"></div>`;
    }

    // Calendar event blocks
    let eventBlocks = '';
    events.filter(ev => ev.start.dateTime).forEach(ev => {
      const s   = toMin(ev.start.dateTime);
      const e2  = toMin(ev.end.dateTime);
      const top = (s - GRID_START * 60) / 60 * HOUR_H;
      const h   = Math.max((e2 - s) / 60 * HOUR_H, 10);
      if (top < 0 || top > TOTAL_H) return;
      const title     = (ev.summary || '').replace('💪 ', '');
      const isWorkout = (ev.summary || '').startsWith('💪');
      const cls       = isWorkout ? 'workout' : 'work';
      eventBlocks += `<div class="gcal-event ${cls}" style="top:${top.toFixed(0)}px;height:${h.toFixed(0)}px" onclick="event.stopPropagation();toggleDay('${key}')">
        <div class="gcal-event-title">${title}</div>
      </div>`;
    });

    // Workout recommendation block
    if (rec?.slot) {
      const s   = rec.slot.s;
      const dur = Math.min(rec.slot.dur, 60);
      const e2  = s + dur;
      const top = (s - GRID_START * 60) / 60 * HOUR_H;
      const h   = Math.max(dur / 60 * HOUR_H, 14);
      if (top >= 0 && top <= TOTAL_H) {
        const wxLabel = wx ? wxEmoji(wx.main) : '';
        eventBlocks += `<div class="gcal-event workout" style="top:${top.toFixed(0)}px;height:${h.toFixed(0)}px" onclick="event.stopPropagation();toggleDay('${key}')">
          <div class="gcal-event-title">${wxLabel} workout</div>
        </div>`;
      }
    }

    // Current time line (today only)
    let nowLine = '';
    if (isToday) {
      const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
      const top    = (nowMin - GRID_START * 60) / 60 * HOUR_H;
      if (top >= 0 && top <= TOTAL_H) {
        nowLine = `<div class="gcal-now-line" style="top:${top.toFixed(0)}px"><div class="gcal-now-dot"></div></div>`;
      }
    }

    return `<div class="gcal-col${isToday ? ' today' : ''}${isSel ? ' selected' : ''}"
         style="height:${TOTAL_H}px" onclick="toggleDay('${key}')">
      ${hourLines}${eventBlocks}${nowLine}
    </div>`;
  }).join('');

  document.getElementById('week-grid').innerHTML = `
    <div class="gcal-header">
      <div></div>
      ${headerCells}
    </div>
    <div class="gcal-body">
      <div class="gcal-time-axis">${timeLabels}</div>
      <div class="gcal-cols">${cols}</div>
    </div>`;
}

// ─────────────────────────────────────────────
// DAY EXPANSION
// ─────────────────────────────────────────────
function toggleDay(key) {
  const slot = document.getElementById('day-detail-slot');
  if (selectedDayKey === key) {
    selectedDayKey = null;
    slot.innerHTML = '';
    renderWeekGrid(getWeekDays().days);
    return;
  }
  selectedDayKey = key;
  renderWeekGrid(getWeekDays().days);

  const day     = new Date(key);
  day.setHours(12, 0, 0, 0);
  const events  = weekEvents[key] || [];
  const rec     = weekRecs[key];
  const wx      = weekForecast[key];
  const isToday = day.toDateString() === new Date().toDateString();

  slot.innerHTML = buildDayDetail(key, day, events, rec, wx, isToday);
  initLessChat(key, slot);
  setTimeout(() => slot.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
}

function buildDayDetail(key, day, events, rec, wx, isToday) {
  const DAYS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const title = isToday
    ? `Today — ${day.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`
    : `${DAYS[day.getDay()]}, ${day.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;

  const slot   = rec?.slot;
  const phrase = rec?.phrase || 'No open windows. Rest day.';
  const type   = rec?.type   || 'Rest day';

  const wxHTML = wx ? `<div class="wx-row" style="margin-bottom:12px">
    <img src="https://openweathermap.org/img/wn/${wx.icon}@2x.png" alt=""/>
    <div><div class="wx-temp">${wx.temp}°</div><div class="wx-desc">${wx.desc}</div></div>
  </div>` : '';

  const tl = (slot && isToday) ? buildTimelineHTML(events, slot) : '';

  const slotHTML = slot ? `
    <div class="section-label" style="margin-bottom:6px">Best window</div>
    <div class="workout-time">${toLabel(slot.s)}</div>
    <div class="tag-row">
      <span class="tag accent">${slot.dur >= 45 ? '45+ min' : slot.dur + ' min'}</span>
      <span class="tag">${type}</span>
    </div>
    ${tl}
    ${isToday ? `<div id="book-slot-${key}" style="margin-top:12px">
      <button class="book-btn" onclick="doBook('${key}','book-slot-${key}')">Add to Calendar</button>
    </div>` : ''}
  ` : `<p style="font-size:13px;color:var(--muted)">No open windows. Rest day.</p>`;

  const timedEvs = events.filter(e => e.start.dateTime);
  const evHTML = timedEvs.length ? `<div style="margin-top:16px">
    <div class="section-label" style="margin-bottom:2px">Schedule</div>
    ${timedEvs.map(ev => `<div class="event-row">
      <span class="ev-title${(ev.summary||'').startsWith('💪')?' workout':''}">${ev.summary||'(no title)'}</span>
      <span class="ev-time">${toLabel(toMin(ev.start.dateTime))} – ${toLabel(toMin(ev.end.dateTime))}</span>
    </div>`).join('')}
  </div>` : '';

  return `<div class="day-detail">
    <div class="day-detail-header">
      <div class="day-detail-title">${title}</div>
      <button class="close-btn" onclick="toggleDay('${key}')">✕</button>
    </div>
    <div class="less-card" style="margin-bottom:16px">
      <div class="less-label">Less</div>
      <div class="less-text">${phrase}</div>
    </div>
    ${wxHTML}
    ${slotHTML}
    ${evHTML}
  </div>`;
}

// ─────────────────────────────────────────────
// TIMELINE
// ─────────────────────────────────────────────
function buildTimelineHTML(events, slot) {
  const LO = 360, HI = 1320;
  const pct = m => Math.max(0, Math.min(100, ((m - LO) / (HI - LO)) * 100));
  const nowMin = new Date().getHours() * 60 + new Date().getMinutes();

  let bars = '';
  events.filter(e => e.start.dateTime).forEach(ev => {
    const s = toMin(ev.start.dateTime), e2 = toMin(ev.end.dateTime);
    bars += `<div class="tl-bar event" style="left:${pct(s).toFixed(1)}%;width:${Math.max(pct(e2)-pct(s),1).toFixed(1)}%"><span>${(ev.summary||'').slice(0,10)}</span></div>`;
  });
  bars += `<div class="tl-bar workout" style="left:${pct(slot.s).toFixed(1)}%;width:${Math.max(pct(slot.e)-pct(slot.s),4).toFixed(1)}%"><span>workout</span></div>`;
  if (nowMin >= LO && nowMin <= HI) bars += `<div class="tl-now" style="left:${pct(nowMin).toFixed(1)}%"></div>`;

  return `<div class="timeline" style="margin-top:14px">${bars}</div>
    <div class="tl-labels"><span>6A</span><span>12P</span><span>6P</span><span>10P</span></div>`;
}

// ─────────────────────────────────────────────
// BOOKING
// ─────────────────────────────────────────────
async function doBook(key, areaId) {
  const rec  = weekRecs[key];
  if (!rec?.slot || !gcToken) return;
  const area = document.getElementById(areaId);
  const btn  = area?.querySelector('.book-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Adding…'; }

  const slot   = rec.slot;
  const day    = new Date(key);
  day.setHours(12, 0, 0, 0);

  try {
    const startDt = new Date(day);
    startDt.setHours(Math.floor(slot.s / 60), slot.s % 60, 0, 0);
    const durMin = Math.min(slot.dur, 60);
    const endDt  = new Date(startDt.getTime() + durMin * 60000);

    const event = {
      summary:     `💪 ${rec.type}`,
      description: rec.phrase,
      start: { dateTime: startDt.toISOString(), timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      end:   { dateTime: endDt.toISOString(),   timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      colorId: '2',
      reminders: { useDefault: false, overrides: [{ method: 'popup', minutes: 15 }] },
    };

    const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method: 'POST',
      headers: { Authorization: `Bearer ${gcToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(event),
    });
    if (!res.ok) throw new Error();
    const created = await res.json();

    if (area) area.innerHTML = `
      <div class="booked-box">
        <div class="booked-check">✓</div>
        <div>
          <div class="booked-text">Added to calendar</div>
          <div class="booked-sub">${toLabel(slot.s)} · ${durMin} min · 15 min reminder</div>
        </div>
      </div>
      <button class="remove-btn" onclick="removeEvent('${created.id}','${areaId}','${key}')">Remove from calendar</button>`;
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Calendar'; }
  }
}

async function removeEvent(eventId, areaId, key) {
  if (!gcToken) return;
  try {
    await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventId}`, {
      method: 'DELETE', headers: { Authorization: `Bearer ${gcToken}` },
    });
    const area = document.getElementById(areaId);
    if (area) area.innerHTML = `<button class="book-btn" onclick="doBook('${key}','${areaId}')">Add to Calendar</button>`;
  } catch(e) { /* silent */ }
}

// ─────────────────────────────────────────────
// PROFILE
// ─────────────────────────────────────────────
function renderProfile() {
  const prefs = JSON.parse(localStorage.getItem('less_onboarding') || '{}');

  const headerSlot = document.getElementById('profile-header-slot');
  if (headerSlot) {
    if (userInfo) {
      const initial = (userInfo.name || 'U')[0].toUpperCase();
      const picHTML = userInfo.picture
        ? `<img src="${userInfo.picture}" alt="" class="profile-pic"/>`
        : `<div class="profile-initials">${initial}</div>`;
      headerSlot.innerHTML = `<div class="profile-header">
        ${picHTML}
        <div>
          <div class="profile-name">${userInfo.name || ''}</div>
          <div class="profile-email">${userInfo.email || ''}</div>
          <div class="connected-row"><div class="connected-dot"></div>Calendar connected</div>
        </div>
      </div>`;
    } else {
      headerSlot.innerHTML = `<p style="font-size:14px;color:var(--muted)">Not signed in</p>`;
    }
  }

  const prefsCard = document.getElementById('prefs-card');
  const prefsSlot = document.getElementById('profile-prefs');
  if (prefsSlot) {
    const rows = [
      ['Frequency',     prefs.frequency],
      ['Session length', prefs.duration],
      ['Preferred time', prefs.time],
      ['Main barrier',   prefs.barrier],
      ['Movement',       prefs.movement],
    ].filter(([,v]) => v);
    if (rows.length) {
      prefsCard.style.display = 'block';
      prefsSlot.innerHTML = rows.map(([label, val]) => `
        <div class="pref-row">
          <span class="pref-label">${label}</span>
          <span class="pref-val">${val}</span>
        </div>`).join('');
    }
  }
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
init();
</script>
