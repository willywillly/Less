<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Less</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #F5F0EA;
  --accent: #C8F135;
  --text:   #1C1C1C;
  --muted:  #9E9E9E;
  --card:   #FFFFFF;
  --border: #EDE8E2;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

#app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

/* ── ONBOARDING ── */
#onboarding {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  display: none;
  flex-direction: column;
  max-width: 430px;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  padding: 0 24px 40px;
}

.ob-logo {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  padding-top: 56px;
}

.ob-progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 24px;
  overflow: hidden;
}
.ob-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(.16,1,.3,1);
}

.ob-question {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 32px 0 24px;
}

.ob-step-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 18px;
}

.ob-q {
  font-size: 26px;
  font-weight: 600;
  line-height: 1.25;
  margin-bottom: 36px;
}

.ob-text-input {
  width: 100%;
  padding: 14px 0;
  background: none;
  border: none;
  border-bottom: 2px solid var(--border);
  font-size: 22px;
  font-family: inherit;
  font-weight: 500;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.ob-text-input:focus { border-color: var(--accent); }
.ob-text-input::placeholder { color: var(--muted); }

.ob-options { display: flex; flex-direction: column; gap: 10px; }

.ob-option {
  width: 100%;
  padding: 17px 20px;
  background: var(--card);
  border: 2px solid transparent;
  border-radius: 16px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: border-color 0.15s, background 0.15s;
}
.ob-option:hover    { border-color: #d4e8a0; }
.ob-option.selected { border-color: var(--accent); background: #f3fcd8; }

.ob-next {
  width: 100%;
  padding: 18px;
  background: var(--accent);
  border: none;
  border-radius: 16px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  margin-top: 8px;
}
.ob-next:hover  { opacity: 0.88; }
.ob-next:active { transform: scale(0.98); }
.ob-next:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* ── MAIN APP ── */
#main-app {
  display: none;
  flex-direction: column;
  min-height: 100vh;
  padding-bottom: 80px;
}

.app-header {
  padding: 52px 20px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-logo     { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.app-greeting { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ── VIEWS ── */
.view {
  display: none;
  flex-direction: column;
  gap: 12px;
  padding: 0 16px;
  animation: fadeUp 0.25s ease forwards;
}
.view.active { display: flex; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── CARDS ── */
.card {
  background: var(--card);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

.less-card {
  background: var(--card);
  border-radius: 20px;
  padding: 20px;
  border-left: 4px solid var(--accent);
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.less-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 8px;
}
.less-text {
  font-size: 17px;
  font-weight: 500;
  line-height: 1.55;
}

.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 12px;
}

/* ── SIGN IN ── */
.signin-card {
  background: var(--card);
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  display: none;
}
.signin-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.signin-card p  { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }

.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 16px;
  background: var(--text);
  border: none;
  border-radius: 14px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  transition: opacity 0.2s;
}
.google-btn:hover    { opacity: 0.85; }
.google-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── WEEK GRID ── */
.week-card {
  background: var(--card);
  border-radius: 20px;
  padding: 16px 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.week-range-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.03em;
  margin-bottom: 12px;
  padding: 0 4px;
}

.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.day-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 3px 10px;
  border-radius: 14px;
  cursor: pointer;
  transition: background 0.15s;
}
.day-col:hover    { background: #f7f3ee; }
.day-col.today    { background: #f3fcd8; }
.day-col.selected { background: #e8f7b0; }

.day-name {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}
.day-num {
  font-size: 15px;
  font-weight: 600;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}
.day-col.today .day-num { background: var(--accent); font-weight: 700; }

.day-pips {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-height: 32px;
  width: 100%;
}
.pip { width: 80%; height: 3px; border-radius: 2px; background: #D8D0C8; }
.pip.workout { background: var(--accent); height: 5px; border-radius: 3px; }

.day-wx { font-size: 13px; line-height: 1; }

/* ── DAY DETAIL ── */
.day-detail {
  background: var(--card);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  animation: fadeUp 0.2s ease forwards;
}
.day-detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.day-detail-title { font-size: 19px; font-weight: 700; }
.close-btn {
  background: var(--bg);
  border: none;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  cursor: pointer;
  color: var(--muted);
  transition: background 0.15s;
}
.close-btn:hover { background: var(--border); }

/* ── WORKOUT DISPLAY ── */
.workout-time {
  font-size: 46px;
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1;
}
.tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.tag {
  padding: 5px 13px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg);
}
.tag.accent { background: var(--accent); }

/* ── TIMELINE ── */
.timeline {
  position: relative;
  height: 52px;
  background: var(--bg);
  border-radius: 12px;
  overflow: hidden;
  margin: 16px 0 4px;
}
.tl-bar {
  position: absolute;
  top: 8px;
  height: 36px;
  border-radius: 7px;
  overflow: hidden;
}
.tl-bar.event {
  background: #E0D8CE;
  display: flex;
  align-items: center;
  padding: 0 6px;
}
.tl-bar.event span { font-size: 9px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-bar.workout {
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
}
.tl-bar.workout span { font-size: 9px; font-weight: 700; }
.tl-now {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: #E05050;
  border-radius: 1px;
}
.tl-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--muted);
  padding: 0 2px;
  margin-bottom: 12px;
}

/* ── BOOKING ── */
.book-btn {
  width: 100%;
  padding: 17px;
  background: var(--accent);
  border: none;
  border-radius: 14px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.book-btn:hover  { opacity: 0.88; }
.book-btn:active { transform: scale(0.98); }
.book-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.booked-box {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: #f3fcd8;
  border-radius: 14px;
}
.booked-check { font-size: 20px; }
.booked-text  { font-size: 14px; font-weight: 600; }
.booked-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

.remove-btn {
  width: 100%;
  padding: 13px;
  background: none;
  border: 1.5px solid #F0C0C0;
  border-radius: 13px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  color: #D05050;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s;
}
.remove-btn:hover { background: #fff5f5; }

/* ── EVENTS LIST ── */
.event-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.event-row:last-child { border: none; }
.ev-title         { font-weight: 500; }
.ev-title.workout { color: #3d9c4a; }
.ev-time          { font-size: 11px; color: var(--muted); white-space: nowrap; margin-left: 8px; }

/* ── WEATHER ── */
.wx-row { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
.wx-row img { width: 48px; height: 48px; }
.wx-temp { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
.wx-desc { font-size: 12px; color: var(--muted); margin-top: 2px; text-transform: capitalize; }

/* ── PROFILE ── */
.profile-header { display: flex; align-items: center; gap: 16px; }
.profile-pic {
  width: 60px; height: 60px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.profile-initials {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  flex-shrink: 0;
}
.profile-name  { font-size: 20px; font-weight: 700; }
.profile-email { font-size: 12px; color: var(--muted); margin-top: 3px; }
.connected-row {
  display: flex; align-items: center; gap: 6px;
  margin-top: 6px; font-size: 12px; font-weight: 500; color: #4CAF50;
}
.connected-dot { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; }

.pref-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.pref-row:last-child { border: none; }
.pref-label { color: var(--muted); font-size: 12px; }
.pref-val   { font-weight: 600; }

.city-input {
  width: 100%; padding: 14px 16px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 12px; font-family: inherit; font-size: 15px;
  color: var(--text); outline: none; margin-top: 8px;
  transition: border-color 0.2s;
}
.city-input:focus { border-color: var(--accent); }

.signout-btn {
  width: 100%; padding: 16px;
  background: none; border: 1.5px solid var(--border);
  border-radius: 14px; font-family: inherit; font-size: 15px;
  font-weight: 500; color: var(--muted); cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.signout-btn:hover { border-color: #D0C8C0; color: var(--text); }

/* ── BOTTOM NAV ── */
#bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 0;
  background: none; border: none;
  font-family: inherit; cursor: pointer;
  transition: opacity 0.15s;
}
.nav-btn:hover { opacity: 0.7; }
.nav-icon  { font-size: 20px; line-height: 1; }
.nav-label {
  font-size: 10px; font-weight: 600;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.nav-btn.active .nav-label { color: var(--text); }

/* ── LOADING ── */
.loading {
  display: flex; justify-content: center; gap: 6px; padding: 48px 20px;
}
.loading-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  animation: bounce 0.8s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.12s; }
.loading-dot:nth-child(3) { animation-delay: 0.24s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.5); opacity: 0.4; }
  40%           { transform: scale(1);   opacity: 1;   }
}

.error-card {
  background: #FFF5F5; border: 1px solid #FFCFCF;
  border-radius: 16px; padding: 16px;
  font-size: 13px; color: #C0392B; line-height: 1.55;
}
</style>
</head>
<body>
<div id="app">

  <!-- ONBOARDING -->
  <div id="onboarding">
    <div class="ob-logo">Less.</div>
    <div class="ob-progress-bar">
      <div class="ob-progress-fill" id="ob-fill" style="width:0%"></div>
    </div>
    <div class="ob-question">
      <div class="ob-step-label" id="ob-step"></div>
      <div class="ob-q" id="ob-q"></div>
      <div id="ob-input-area"></div>
    </div>
    <button class="ob-next" id="ob-next" disabled onclick="obNext()">Continue →</button>
  </div>

  <!-- MAIN APP -->
  <div id="main-app">
    <div class="app-header">
      <div>
        <div class="app-logo">Less.</div>
        <div class="app-greeting" id="app-greeting"></div>
      </div>
      <div id="user-mini" style="display:none">
        <img id="user-pic" src="" alt="" class="profile-pic" style="width:34px;height:34px"/>
      </div>
    </div>

    <!-- WEEK VIEW -->
    <div class="view active" id="view-week">
      <div class="signin-card" id="signin-card">
        <h2>Connect your calendar</h2>
        <p>Less reads your schedule to find your best workout windows — no thinking required.</p>
        <button class="google-btn" id="google-btn" onclick="connectGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Sign in with Google
        </button>
      </div>

      <div class="loading" id="week-loading" style="display:none">
        <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
      </div>

      <div id="week-content" style="display:none">
        <div class="week-card">
          <div class="week-range-label" id="week-range"></div>
          <div class="week-grid" id="week-grid"></div>
        </div>
        <div id="day-detail-slot"></div>
      </div>
    </div>

    <!-- TODAY VIEW -->
    <div class="view" id="view-today">
      <div class="loading" id="today-loading" style="display:none">
        <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
      </div>
      <div id="today-content"></div>
    </div>

    <!-- PROFILE VIEW -->
    <div class="view" id="view-profile">
      <div class="card">
        <div id="profile-header-slot">
          <p style="font-size:14px;color:var(--muted)">Not signed in</p>
        </div>
      </div>
      <div class="card" id="prefs-card" style="display:none">
        <div class="section-label">Your preferences</div>
        <div id="profile-prefs"></div>
      </div>
      <div class="card">
        <div class="section-label">Location</div>
        <p style="font-size:12px;color:var(--muted)">Used for live weather data</p>
        <input class="city-input" id="city-input" type="text" placeholder="City, State"/>
      </div>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>

    <!-- BOTTOM NAV -->
    <nav id="bottom-nav">
      <button class="nav-btn active" id="nav-week" onclick="showView('week')">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Week</span>
      </button>
      <button class="nav-btn" id="nav-today" onclick="showView('today')">
        <span class="nav-icon">⚡</span>
        <span class="nav-label">Today</span>
      </button>
      <button class="nav-btn" id="nav-profile" onclick="showView('profile')">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </button>
    </nav>
  </div>
</div>

<script>
// ── CONFIG ──
const GC_ID  = "855044137697-d4aanrhb4cklaoh471atit4ibep87nl5.apps.googleusercontent.com";
const OW_KEY = "98bdd5b55dfead8e98b676bfc235e291";
const SCOPE  = "https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events";

// ── STATE ──
let gcToken     = null;
let userInfo    = null;
let tokenClient = null;
let weekEvents   = {};
let weekForecast = {};
let weekRecs     = {};
let selectedDayKey = null;

// ─────────────────────────────────────────────
// ONBOARDING
// ─────────────────────────────────────────────
const OB_STEPS = [
  { key: 'name',      q: "What's your name?",                               type: 'text',    placeholder: 'Your name…' },
  { key: 'frequency', q: 'How many days a week can you realistically move?', type: 'options', options: ['1–3 days', '3–5 days', 'Every day'] },
  { key: 'duration',  q: 'How long per session?',                            type: 'options', options: ['15–30 min', '30–45 min', '45+ min'] },
  { key: 'time',      q: 'What time of day do you prefer?',                  type: 'options', options: ['Morning', 'Afternoon', 'Evening', 'No preference'] },
  { key: 'barrier',   q: 'What usually gets in the way?',                    type: 'options', options: ['Work', 'Energy', 'Motivation', 'Time'] },
  { key: 'movement',  q: 'What kind of movement do you like?',               type: 'options', options: ['Walking / Running', 'Gym', 'Home workouts', 'Anything'] },
];

let obStep = 0, obAnswers = {}, obCurrent = null;

function showOnboarding() {
  document.getElementById('onboarding').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
  renderObStep();
}

function renderObStep() {
  const step  = OB_STEPS[obStep];
  const total = OB_STEPS.length;
  document.getElementById('ob-fill').style.width    = `${(obStep / total) * 100}%`;
  document.getElementById('ob-step').textContent    = `${obStep + 1} of ${total}`;
  document.getElementById('ob-q').textContent       = step.q;
  obCurrent = null;
  const next = document.getElementById('ob-next');
  next.disabled    = true;
  next.textContent = obStep < total - 1 ? 'Continue →' : 'Get started →';

  const area = document.getElementById('ob-input-area');
  if (step.type === 'text') {
    area.innerHTML = `<input class="ob-text-input" id="ob-text" type="text" placeholder="${step.placeholder}" autocomplete="given-name"/>`;
    const inp = document.getElementById('ob-text');
    inp.focus();
    inp.addEventListener('input', () => { obCurrent = inp.value.trim(); next.disabled = !obCurrent; });
    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && obCurrent) obNext(); });
  } else {
    area.innerHTML = `<div class="ob-options">${
      step.options.map(opt => `<button class="ob-option" onclick="obSelect(this,'${opt.replace(/'/g,"&#39;")}')">${opt}</button>`).join('')
    }</div>`;
  }
}

function obSelect(btn, val) {
  document.querySelectorAll('.ob-option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  obCurrent = val;
  document.getElementById('ob-next').disabled = false;
}

function obNext() {
  if (!obCurrent) return;
  obAnswers[OB_STEPS[obStep].key] = obCurrent;
  obStep++;
  if (obStep >= OB_STEPS.length) {
    localStorage.setItem('less_onboarding', JSON.stringify(obAnswers));
    localStorage.setItem('less_onboarding_done', '1');
    document.getElementById('ob-fill').style.width = '100%';
    setTimeout(() => {
      document.getElementById('onboarding').style.display = 'none';
      bootMainApp();
    }, 280);
  } else {
    renderObStep();
  }
}

// ─────────────────────────────────────────────
// SESSION PERSISTENCE (localStorage)
// ─────────────────────────────────────────────
function storeSession(token, user) {
  localStorage.setItem('less_session', JSON.stringify({
    token,
    user,
    expiry: Date.now() + 55 * 60 * 1000,
  }));
}

function loadSession() {
  try {
    const s = JSON.parse(localStorage.getItem('less_session') || 'null');
    if (!s) return null;
    if (Date.now() > s.expiry) return { token: null, user: s.user };
    return s;
  } catch { return null; }
}

function clearSession() {
  localStorage.removeItem('less_session');
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
function init() {
  if (!localStorage.getItem('less_onboarding_done')) {
    showOnboarding();
    return;
  }
  bootMainApp();
}

function bootMainApp() {
  const app = document.getElementById('main-app');
  app.style.display       = 'flex';
  app.style.flexDirection = 'column';

  updateGreeting();
  renderProfile();

  const session = loadSession();
  if (session && session.token) {
    gcToken  = session.token;
    userInfo = session.user;
    updateUserUI();
    initTokenClient(session.user?.email || '');
    showSignedIn();
    loadWeekData();
  } else if (session && session.user) {
    // Token expired — have user info for hint; try silent refresh
    userInfo = session.user;
    updateUserUI();
    document.getElementById('week-loading').style.display = 'flex';
    document.getElementById('today-loading').style.display = 'flex';
    initTokenClient(session.user.email || '', true);
  } else {
    document.getElementById('signin-card').style.display = 'block';
    initTokenClient('', false);
  }
}

// ─────────────────────────────────────────────
// GOOGLE AUTH
// ─────────────────────────────────────────────
function initTokenClient(hint, silentRefresh) {
  if (!window.google) {
    setTimeout(() => initTokenClient(hint, silentRefresh), 150);
    return;
  }
  const cfg = { client_id: GC_ID, scope: SCOPE, callback: onTokenReceived };
  if (hint) cfg.login_hint = hint;
  tokenClient = window.google.accounts.oauth2.initTokenClient(cfg);
  if (silentRefresh) tokenClient.requestAccessToken({ prompt: '' });
}

async function onTokenReceived(resp) {
  if (resp.error) {
    document.getElementById('week-loading').style.display   = 'none';
    document.getElementById('today-loading').style.display  = 'none';
    document.getElementById('signin-card').style.display    = 'block';
    const btn = document.getElementById('google-btn');
    if (btn) { btn.disabled = false; }
    return;
  }
  gcToken = resp.access_token;
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: `Bearer ${gcToken}` },
    });
    userInfo = await r.json();
    storeSession(gcToken, userInfo);
    updateUserUI();
  } catch(e) { storeSession(gcToken, null); }
  showSignedIn();
  await loadWeekData();
}

function showSignedIn() {
  document.getElementById('signin-card').style.display   = 'none';
  document.getElementById('week-loading').style.display  = 'none';
}

function connectGoogle() {
  if (!tokenClient) { setTimeout(connectGoogle, 150); return; }
  const btn = document.getElementById('google-btn');
  btn.disabled    = true;
  btn.textContent = 'Connecting…';
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function updateUserUI() {
  if (!userInfo) return;
  const pic  = document.getElementById('user-pic');
  const mini = document.getElementById('user-mini');
  if (userInfo.picture) { pic.src = userInfo.picture; mini.style.display = 'block'; }
  updateGreeting();
  renderProfile();
}

function updateGreeting() {
  const prefs = JSON.parse(localStorage.getItem('less_onboarding') || '{}');
  const name  = prefs.name || userInfo?.name?.split(' ')[0] || '';
  const h     = new Date().getHours();
  const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  const el = document.getElementById('app-greeting');
  if (el) el.textContent = name ? `${greet}, ${name}.` : new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
}

function signOut() {
  clearSession();
  localStorage.removeItem('less_onboarding_done');
  localStorage.removeItem('less_onboarding');
  location.reload();
}

// ─────────────────────────────────────────────
// DATA LOADING
// ─────────────────────────────────────────────
async function loadWeekData() {
  document.getElementById('week-loading').style.display  = 'flex';
  document.getElementById('week-content').style.display  = 'none';
  document.getElementById('today-loading').style.display = 'flex';
  document.getElementById('today-content').innerHTML     = '';

  try {
    const { weekStart, weekEnd, days } = getWeekDays();

    const calRes = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${weekStart.toISOString()}&timeMax=${weekEnd.toISOString()}&singleEvents=true&orderBy=startTime`,
      { headers: { Authorization: `Bearer ${gcToken}` } }
    );
    if (!calRes.ok) throw new Error('Calendar fetch failed. Make sure Calendar API is enabled.');
    const allEvents = (await calRes.json()).items || [];

    weekEvents = {};
    for (const day of days) {
      const key = dayKey(day);
      weekEvents[key] = allEvents.filter(ev => {
        const d = new Date(ev.start.dateTime || ev.start.date + 'T00:00:00');
        return d.toDateString() === day.toDateString();
      });
    }

    const city = localStorage.getItem('less_city') || document.getElementById('city-input')?.value || 'New Brunswick,NJ';
    try {
      const wxRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&appid=${OW_KEY}&units=imperial`);
      if (wxRes.ok) buildWeekForecast(days, await wxRes.json());
    } catch(e) { /* weather optional */ }

    weekRecs = {};
    for (const day of days) {
      const key = dayKey(day);
      weekRecs[key] = computeRec(day, weekEvents[key] || [], weekForecast[key]);
    }

    const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    document.getElementById('week-range').textContent = `${fmt(days[0])} – ${fmt(days[6])}`;

    renderWeekGrid(days);
    renderTodayView();

    document.getElementById('week-loading').style.display  = 'none';
    document.getElementById('week-content').style.display  = 'block';
    document.getElementById('today-loading').style.display = 'none';

  } catch(e) {
    document.getElementById('week-loading').style.display  = 'none';
    document.getElementById('today-loading').style.display = 'none';
    const err = document.createElement('div');
    err.className = 'error-card';
    err.style.margin = '0 16px';
    err.textContent = e.message;
    document.getElementById('view-week').appendChild(err);
  }
}

// ─────────────────────────────────────────────
// WEEK UTILS
// ─────────────────────────────────────────────
function getWeekDays() {
  const today  = new Date();
  const dow    = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  monday.setHours(0, 0, 0, 0);

  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });

  const weekStart = new Date(monday);
  const weekEnd   = new Date(monday);
  weekEnd.setDate(monday.getDate() + 7);

  return { weekStart, weekEnd, days };
}

function dayKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// ─────────────────────────────────────────────
// WEATHER
// ─────────────────────────────────────────────
function buildWeekForecast(days, wxData) {
  const list = wxData.list || [];
  for (const day of days) {
    const noon   = new Date(day);
    noon.setHours(12, 0, 0, 0);
    const noonTs = noon.getTime() / 1000;
    let closest = null, minDiff = Infinity;
    for (const item of list) {
      const diff = Math.abs(item.dt - noonTs);
      if (diff < minDiff) { minDiff = diff; closest = item; }
    }
    if (closest) {
      weekForecast[dayKey(day)] = {
        icon: closest.weather[0].icon,
        temp: Math.round(closest.main.temp),
        desc: closest.weather[0].description,
        main: closest.weather[0].main,
      };
    }
  }
}

const WX_EMOJI = { Clear:'☀️', Clouds:'☁️', Rain:'🌧', Drizzle:'🌦', Thunderstorm:'⛈', Snow:'❄️', Mist:'🌫', Fog:'🌫', Haze:'🌫' };
const wxEmoji = main => WX_EMOJI[main] || '🌤';

// ─────────────────────────────────────────────
// FREE SLOTS
// ─────────────────────────────────────────────
function toMin(iso) { const d = new Date(iso); return d.getHours() * 60 + d.getMinutes(); }

function toLabel(m) {
  const h = Math.floor(m / 60), mn = m % 60;
  return `${h % 12 || 12}:${String(mn).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;
}

function getFreeSlots(events, date) {
  const isToday = date.toDateString() === new Date().toDateString();
  const nowMin  = isToday ? new Date().getHours() * 60 + new Date().getMinutes() : 0;

  const busy = events
    .filter(ev => ev.start.dateTime)
    .map(ev => ({ s: toMin(ev.start.dateTime), e: toMin(ev.end.dateTime) }))
    .sort((a, b) => a.s - b.s);

  const merged = [];
  for (const b of busy) {
    if (merged.length && b.s <= merged[merged.length - 1].e)
      merged[merged.length - 1].e = Math.max(merged[merged.length - 1].e, b.e);
    else merged.push({ ...b });
  }

  let cur = Math.max(360, isToday ? nowMin : 360);
  const slots = [];
  for (const b of merged) {
    if (b.s > cur && b.s - cur >= 20) slots.push({ s: cur, e: b.s, dur: b.s - cur });
    cur = Math.max(cur, b.e);
  }
  if (1320 - cur >= 20) slots.push({ s: cur, e: 1320, dur: 1320 - cur });
  return slots;
}

// ─────────────────────────────────────────────
// RECOMMENDATION ENGINE
// ─────────────────────────────────────────────
function scoreSlots(slots, wx) {
  const rain = wx && ['Rain','Drizzle','Thunderstorm','Snow'].includes(wx.main);
  const nice = wx && !rain && wx.temp > 40 && wx.temp < 90;
  return slots.map(sl => {
    let score = 0;
    if (sl.dur >= 45) score += 2; else if (sl.dur >= 30) score += 1;
    if (nice) score += 1;
    if (rain) score -= 1;
    const mid = (sl.s + sl.e) / 2;
    if (mid >= 360 && mid <= 720) score += 0.5;
    return { ...sl, score, rain, nice };
  }).sort((a, b) => b.score - a.score || b.dur - a.dur);
}

function computeRec(date, events, wx) {
  const slots = getFreeSlots(events, date);
  const prefs = JSON.parse(localStorage.getItem('less_onboarding') || '{}');
  if (!slots.length) return { slot: null, phrase: buildPhrase(date, null, 0, wx), type: 'Rest day' };

  const scored = scoreSlots(slots, wx);
  let best = scored[0];

  const tMap = { Morning: [360, 720], Afternoon: [720, 1020], Evening: [1020, 1320] };
  if (prefs.time && tMap[prefs.time]) {
    const [lo, hi] = tMap[prefs.time];
    const pref = scored.find(s => s.s >= lo && s.s < hi);
    if (pref && pref.score >= best.score - 1) best = pref;
  }

  return { slot: best, phrase: buildPhrase(date, best, slots.length, wx), type: getWorkoutType(prefs, wx), scored, events, wx };
}

function getWorkoutType(prefs, wx) {
  const m    = prefs.movement || 'Anything';
  const rain = wx && ['Rain','Drizzle','Thunderstorm','Snow'].includes(wx.main);
  if (rain && m !== 'Gym' && m !== 'Home workouts') return 'Home workout';
  if (m === 'Walking / Running') return 'Run or walk';
  if (m === 'Gym')               return 'Gym session';
  if (m === 'Home workouts')     return 'Home workout';
  return 'Your choice';
}

function buildPhrase(date, slot, totalSlots, wx) {
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const today = new Date();
  const tom   = new Date(); tom.setDate(today.getDate() + 1);
  const isToday    = date.toDateString() === today.toDateString();
  const isTomorrow = date.toDateString() === tom.toDateString();
  const ref  = isToday ? 'Today' : isTomorrow ? 'Tomorrow' : DAYS[date.getDay()];

  const rain = wx && ['Rain','Drizzle','Thunderstorm','Snow'].includes(wx.main);
  const hot  = wx && wx.temp > 87;
  const cold = wx && wx.temp < 36;

  if (!slot) {
    if (isToday) return "Today's packed. Rest up — you can always sneak in 10 minutes.";
    return `${ref} looks tight. A rest day is still a good day.`;
  }

  const time   = toLabel(slot.s);
  const durStr = slot.dur >= 45 ? '45 minutes' : slot.dur >= 30 ? '30 minutes' : '20 minutes';

  if (totalSlots === 1) {
    if (rain) return `${ref} has one window — ${time}. Weather's rough, keep it inside.`;
    return `One open slot ${isToday ? 'today' : 'on ' + DAYS[date.getDay()]} — ${time}. Make it count.`;
  }

  if (slot.s < 720) {
    if (rain)  return `Morning window at ${time}. Take it inside — ${durStr}.`;
    if (cold)  return `${time} works. It's cold out, layer up or stay in.`;
    return `${ref} morning looks open at ${time}. ${durStr}, go move.`;
  }

  if (slot.s >= 1020) {
    if (rain) return `${time} ${isToday ? 'tonight' : 'on ' + DAYS[date.getDay()]} — indoor workout, ${durStr}.`;
    return `${ref} at ${time} looks clean. Good time to decompress.`;
  }

  if (hot)  return `${time} is open. Hot out — hydrate or go early.`;
  if (rain) return `${time} on ${ref} — ${durStr} inside. The weather's not cooperating.`;
  if (totalSlots >= 3) return `${ref} at ${time} looks clean. ${durStr}, go outside.`;
  return `${time} is your best window ${isToday ? 'today' : 'on ' + DAYS[date.getDay()]}. ${durStr}.`;
}

// ─────────────────────────────────────────────
// WEEK GRID
// ─────────────────────────────────────────────
function renderWeekGrid(days) {
  const DAY_NAMES = ['Mo','Tu','We','Th','Fr','Sa','Su'];
  const todayStr  = new Date().toDateString();

  document.getElementById('week-grid').innerHTML = days.map((day, i) => {
    const key     = dayKey(day);
    const isToday = day.toDateString() === todayStr;
    const isSel   = selectedDayKey === key;
    const events  = weekEvents[key] || [];
    const rec     = weekRecs[key];
    const wx      = weekForecast[key];
    const evCount = Math.min(events.filter(e => e.start.dateTime).length, 4);
    const pips    = Array(evCount).fill('<div class="pip"></div>').join('');
    const wPip    = rec?.slot ? '<div class="pip workout"></div>' : '';

    return `<div class="day-col${isToday?' today':''}${isSel?' selected':''}" onclick="toggleDay('${key}')">
      <div class="day-name">${DAY_NAMES[i]}</div>
      <div class="day-num">${day.getDate()}</div>
      <div class="day-pips">${pips}${wPip}</div>
      <div class="day-wx">${wx ? wxEmoji(wx.main) : ''}</div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
// DAY EXPANSION
// ─────────────────────────────────────────────
function toggleDay(key) {
  const slot = document.getElementById('day-detail-slot');
  if (selectedDayKey === key) {
    selectedDayKey = null;
    slot.innerHTML = '';
    renderWeekGrid(getWeekDays().days);
    return;
  }
  selectedDayKey = key;
  renderWeekGrid(getWeekDays().days);

  const day     = new Date(key);
  day.setHours(12, 0, 0, 0);
  const events  = weekEvents[key] || [];
  const rec     = weekRecs[key];
  const wx      = weekForecast[key];
  const isToday = day.toDateString() === new Date().toDateString();

  slot.innerHTML = buildDayDetail(key, day, events, rec, wx, isToday);
  setTimeout(() => slot.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
}

function buildDayDetail(key, day, events, rec, wx, isToday) {
  const DAYS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const title = isToday
    ? `Today — ${day.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`
    : `${DAYS[day.getDay()]}, ${day.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;

  const slot   = rec?.slot;
  const phrase = rec?.phrase || 'No open windows. Rest day.';
  const type   = rec?.type   || 'Rest day';

  const wxHTML = wx ? `<div class="wx-row" style="margin-bottom:12px">
    <img src="https://openweathermap.org/img/wn/${wx.icon}@2x.png" alt=""/>
    <div><div class="wx-temp">${wx.temp}°</div><div class="wx-desc">${wx.desc}</div></div>
  </div>` : '';

  const tl = (slot && isToday) ? buildTimelineHTML(events, slot) : '';

  const slotHTML = slot ? `
    <div class="section-label" style="margin-bottom:6px">Best window</div>
    <div class="workout-time">${toLabel(slot.s)}</div>
    <div class="tag-row">
      <span class="tag accent">${slot.dur >= 45 ? '45+ min' : slot.dur + ' min'}</span>
      <span class="tag">${type}</span>
    </div>
    ${tl}
    ${isToday ? `<div id="book-slot-${key}" style="margin-top:12px">
      <button class="book-btn" onclick="doBook('${key}','book-slot-${key}')">Add to Calendar</button>
    </div>` : ''}
  ` : `<p style="font-size:13px;color:var(--muted)">No open windows. Rest day.</p>`;

  const timedEvs = events.filter(e => e.start.dateTime);
  const evHTML = timedEvs.length ? `<div style="margin-top:16px">
    <div class="section-label" style="margin-bottom:2px">Schedule</div>
    ${timedEvs.map(ev => `<div class="event-row">
      <span class="ev-title${(ev.summary||'').startsWith('💪')?' workout':''}">${ev.summary||'(no title)'}</span>
      <span class="ev-time">${toLabel(toMin(ev.start.dateTime))} – ${toLabel(toMin(ev.end.dateTime))}</span>
    </div>`).join('')}
  </div>` : '';

  return `<div class="day-detail">
    <div class="day-detail-header">
      <div class="day-detail-title">${title}</div>
      <button class="close-btn" onclick="toggleDay('${key}')">✕</button>
    </div>
    <div class="less-card" style="margin-bottom:16px">
      <div class="less-label">Less</div>
      <div class="less-text">${phrase}</div>
    </div>
    ${wxHTML}
    ${slotHTML}
    ${evHTML}
  </div>`;
}

// ─────────────────────────────────────────────
// TIMELINE
// ─────────────────────────────────────────────
function buildTimelineHTML(events, slot) {
  const LO = 360, HI = 1320;
  const pct = m => Math.max(0, Math.min(100, ((m - LO) / (HI - LO)) * 100));
  const nowMin = new Date().getHours() * 60 + new Date().getMinutes();

  let bars = '';
  events.filter(e => e.start.dateTime).forEach(ev => {
    const s = toMin(ev.start.dateTime), e2 = toMin(ev.end.dateTime);
    bars += `<div class="tl-bar event" style="left:${pct(s).toFixed(1)}%;width:${Math.max(pct(e2)-pct(s),1).toFixed(1)}%"><span>${(ev.summary||'').slice(0,10)}</span></div>`;
  });
  bars += `<div class="tl-bar workout" style="left:${pct(slot.s).toFixed(1)}%;width:${Math.max(pct(slot.e)-pct(slot.s),4).toFixed(1)}%"><span>workout</span></div>`;
  if (nowMin >= LO && nowMin <= HI) bars += `<div class="tl-now" style="left:${pct(nowMin).toFixed(1)}%"></div>`;

  return `<div class="timeline" style="margin-top:14px">${bars}</div>
    <div class="tl-labels"><span>6A</span><span>12P</span><span>6P</span><span>10P</span></div>`;
}

// ─────────────────────────────────────────────
// TODAY VIEW
// ─────────────────────────────────────────────
function renderTodayView() {
  const key    = dayKey(new Date());
  const events = weekEvents[key] || [];
  const rec    = weekRecs[key];
  const wx     = weekForecast[key];
  const slot   = rec?.slot;
  const phrase = rec?.phrase || 'Take it easy today.';
  const type   = rec?.type   || 'Rest day';

  const wxHTML = wx ? `<div class="card"><div class="wx-row">
    <img src="https://openweathermap.org/img/wn/${wx.icon}@2x.png" alt=""/>
    <div><div class="wx-temp">${wx.temp}°F</div><div class="wx-desc">${wx.desc}</div></div>
  </div></div>` : '';

  const slotHTML = slot ? `<div class="card">
    <div class="section-label">Best window today</div>
    <div class="workout-time">${toLabel(slot.s)}</div>
    <div class="tag-row">
      <span class="tag accent">${slot.dur >= 45 ? '45+ min' : slot.dur + ' min'}</span>
      <span class="tag">${type}</span>
    </div>
    ${buildTimelineHTML(events, slot)}
    <div id="book-today-area" style="margin-top:12px">
      <button class="book-btn" onclick="doBook('${key}','book-today-area')">Add to Calendar</button>
    </div>
  </div>` : `<div class="card" style="text-align:center;padding:32px 20px">
    <p style="font-size:14px;color:var(--muted)">No open windows today. Rest up.</p>
  </div>`;

  const timedEvs = events.filter(e => e.start.dateTime);
  const evHTML = timedEvs.length ? `<div class="card">
    <div class="section-label">Today's schedule</div>
    ${timedEvs.map(ev => `<div class="event-row">
      <span class="ev-title${(ev.summary||'').startsWith('💪')?' workout':''}">${ev.summary||'(no title)'}</span>
      <span class="ev-time">${toLabel(toMin(ev.start.dateTime))} – ${toLabel(toMin(ev.end.dateTime))}</span>
    </div>`).join('')}
  </div>` : '';

  document.getElementById('today-content').innerHTML = `
    <div class="less-card"><div class="less-label">Less</div><div class="less-text">${phrase}</div></div>
    ${wxHTML}${slotHTML}${evHTML}`;
}

// ─────────────────────────────────────────────
// BOOKING
// ─────────────────────────────────────────────
async function doBook(key, areaId) {
  const rec  = weekRecs[key];
  if (!rec?.slot || !gcToken) return;
  const area = document.getElementById(areaId);
  const btn  = area?.querySelector('.book-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Adding…'; }

  const slot   = rec.slot;
  const day    = new Date(key);
  day.setHours(12, 0, 0, 0);

  try {
    const startDt = new Date(day);
    startDt.setHours(Math.floor(slot.s / 60), slot.s % 60, 0, 0);
    const durMin = Math.min(slot.dur, 60);
    const endDt  = new Date(startDt.getTime() + durMin * 60000);

    const event = {
      summary:     `💪 ${rec.type}`,
      description: rec.phrase,
      start: { dateTime: startDt.toISOString(), timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      end:   { dateTime: endDt.toISOString(),   timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      colorId: '2',
      reminders: { useDefault: false, overrides: [{ method: 'popup', minutes: 15 }] },
    };

    const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method: 'POST',
      headers: { Authorization: `Bearer ${gcToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(event),
    });
    if (!res.ok) throw new Error();
    const created = await res.json();

    if (area) area.innerHTML = `
      <div class="booked-box">
        <div class="booked-check">✓</div>
        <div>
          <div class="booked-text">Added to calendar</div>
          <div class="booked-sub">${toLabel(slot.s)} · ${durMin} min · 15 min reminder</div>
        </div>
      </div>
      <button class="remove-btn" onclick="removeEvent('${created.id}','${areaId}','${key}')">Remove from calendar</button>`;
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Add to Calendar'; }
  }
}

async function removeEvent(eventId, areaId, key) {
  if (!gcToken) return;
  try {
    await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventId}`, {
      method: 'DELETE', headers: { Authorization: `Bearer ${gcToken}` },
    });
    const area = document.getElementById(areaId);
    if (area) area.innerHTML = `<button class="book-btn" onclick="doBook('${key}','${areaId}')">Add to Calendar</button>`;
  } catch(e) { /* silent */ }
}

// ─────────────────────────────────────────────
// PROFILE
// ─────────────────────────────────────────────
function renderProfile() {
  const prefs = JSON.parse(localStorage.getItem('less_onboarding') || '{}');

  const headerSlot = document.getElementById('profile-header-slot');
  if (headerSlot) {
    if (userInfo) {
      const initial = (userInfo.name || 'U')[0].toUpperCase();
      const picHTML = userInfo.picture
        ? `<img src="${userInfo.picture}" alt="" class="profile-pic"/>`
        : `<div class="profile-initials">${initial}</div>`;
      headerSlot.innerHTML = `<div class="profile-header">
        ${picHTML}
        <div>
          <div class="profile-name">${userInfo.name || ''}</div>
          <div class="profile-email">${userInfo.email || ''}</div>
          <div class="connected-row"><div class="connected-dot"></div>Calendar connected</div>
        </div>
      </div>`;
    } else {
      headerSlot.innerHTML = `<p style="font-size:14px;color:var(--muted)">Not signed in</p>`;
    }
  }

  const prefsCard = document.getElementById('prefs-card');
  const prefsSlot = document.getElementById('profile-prefs');
  if (prefsSlot) {
    const rows = [
      ['Frequency',     prefs.frequency],
      ['Session length', prefs.duration],
      ['Preferred time', prefs.time],
      ['Main barrier',   prefs.barrier],
      ['Movement',       prefs.movement],
    ].filter(([,v]) => v);
    if (rows.length) {
      prefsCard.style.display = 'block';
      prefsSlot.innerHTML = rows.map(([label, val]) => `
        <div class="pref-row">
          <span class="pref-label">${label}</span>
          <span class="pref-val">${val}</span>
        </div>`).join('');
    }
  }

  const cityInput = document.getElementById('city-input');
  if (cityInput) {
    cityInput.value = localStorage.getItem('less_city') || 'New Brunswick, NJ';
    cityInput.addEventListener('change', () => localStorage.setItem('less_city', cityInput.value));
  }
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
init();
</script>
